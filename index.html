<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea House</title>
    <!-- Taliwind Attach Link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome Attach -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Font Attach -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>
<body>
    <header class="container mx-auto">
        <section class=" grid-cols-1 md:grid-cols-2 grid">
            <div class="left-side-banner space-y-[30px]">
                <h2 class="text-[80px] text-[#1C1C1C]">It's good <br> tea time at The <br> Tea House</h2>
                <p class="text-[18px] text-[#777777]">Tea and Botanical Solutions Supplier Give Optimum <br> Satisfaction To Your Taste Buds.</p>
                <button class="py-4 px-8 rounded-md text-white font-semibold bg-linear-to-r from-[#FF8938] to-[#FF0000]">Explore More<span class="rotate-45 inline-block"> <i class="fa-solid fa-arrow-up-long inlin"></i> </span></button>
            </div>
            <div class="right-side-banner flex justify-end items-end relative">
                <img src="images/banner.png" alt="Tea Image py-[25px] px-[15px]">
                <div class="bg-white rounded-xl shadow-2xl gap-2 flex justify-center items-center w-[250px] h-[100px] gap-2 absolute bottom[15px] left-[200px]">
                <img src="images/Star.png" alt="">
                <div><h2 class="text-[30px] text-[#1C1C1C] font-bold">5.00</h2>
                <p class="text-[16px] text-[#777777]">Trust Pilot Ratings</p></div>
            </div>
            </div>
        </section>
    </header>
    <main></main>
    <footer></footer>
</body>
</html>
